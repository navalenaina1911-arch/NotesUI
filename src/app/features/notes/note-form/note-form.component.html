<app-modal (closed)="cancel.emit()">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="note-form">
    <h2 class="form-title">{{ note ? 'Edit Note' : 'Create Note' }}</h2>

    <div class="form-group">
      <label>Title</label>
      <input formControlName="title" placeholder="Enter note title" />
    </div>

    <div class="form-group">
      <label>Content</label>
      <textarea formControlName="content" placeholder="Write your note..." rows="4"></textarea>
    </div>

    <div class="actions">
      <button type="submit" class="save-btn" [disabled]="form.invalid">💾 Save</button>
      <button type="button" class="cancel-btn" (click)="cancel.emit()">Cancel</button>
    </div>
  </form>
</app-modal>
