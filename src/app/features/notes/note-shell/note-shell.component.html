
<div class="shell">
  <header class="toolbar">
    <h1>🗒️ My Notes</h1>

    <button (click)="openCreate()">
      ➕ Add Note
    </button>
  </header>

  <app-notes-search></app-notes-search>
  <app-notes-list (edit)="onEdit($event)"></app-notes-list>
</div>

@if (showForm()) {
  <app-note-form
    [note]="editingNote()"
    (cancel)="closeForm()">
  </app-note-form>
}
